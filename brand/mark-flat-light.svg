<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="BipBop Labs">
  <title>BipBop Labs</title>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
      .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; }
    ]]></style>

    <radialGradient id="topGlow" cx="78%" cy="14%" r="62%">
      <stop offset="0%"  stop-color="#0e8a44" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#0e8a44" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0e8a44" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="botGlow" cx="14%" cy="98%" r="55%">
      <stop offset="0%"  stop-color="#0e8a44" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0e8a44" stop-opacity="0"/>
    </radialGradient>

    <filter id="cursorGlow" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="320" height="320" fill="#f3eee5"/>
  <rect width="320" height="320" fill="url(#topGlow)"/>
  <rect width="320" height="320" fill="url(#botGlow)"/>

  <text class="serif" x="160" y="200" text-anchor="middle" font-size="140" fill="#161513"
        dominant-baseline="alphabetic">B<tspan font-style="italic" fill="#4a4640">b</tspan><tspan fill="#0e8a44" filter="url(#cursorGlow)">_</tspan></text>
</svg>
