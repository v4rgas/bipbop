<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="BipBop Labs">
  <title>BipBop Labs · software hecho con cariño</title>
  <defs>
    <radialGradient id="glow" cx="82%" cy="6%" r="60%">
      <stop offset="0%"  stop-color="#6cf09a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6cf09a" stop-opacity="0"/>
    </radialGradient>
    <filter id="cursor-glow" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0e0e10"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- wordmark -->
  <text x="88" y="330" font-family="'Instrument Serif', 'Times New Roman', serif"
        font-size="208" fill="#f3eee5" letter-spacing="-3">Bip<tspan
        font-style="italic" fill="#6cf09a">Bop</tspan> Labs<tspan
        fill="#6cf09a" filter="url(#cursor-glow)">_</tspan></text>

  <!-- lede -->
  <text x="88" y="430" font-family="'Instrument Serif', 'Times New Roman', serif"
        font-size="48" fill="#d8d2c5">Software <tspan
        font-style="italic" fill="#6cf09a">hecho con cariño</tspan>,</text>
  <text x="88" y="490" font-family="'Instrument Serif', 'Times New Roman', serif"
        font-size="48" fill="#d8d2c5">para las empresas que están detrás.</text>

  <!-- meta strip -->
  <line x1="88" y1="558" x2="1112" y2="558" stroke="#2a2a30" stroke-width="1"/>
  <text x="88" y="592" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-size="20" letter-spacing="5" fill="#6b6b74">SANTIAGO · CL</text>
  <text x="1112" y="592" text-anchor="end" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-size="20" letter-spacing="5" fill="#f3eee5">BIPBOP.CL</text>
</svg>
