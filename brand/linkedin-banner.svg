<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" preserveAspectRatio="xMidYMid meet" role="img" aria-label="BipBop Labs banner">
  <title>BipBop Labs</title>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
      .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; }
    ]]></style>

    <radialGradient id="topGlow" cx="78%" cy="0%" r="65%">
      <stop offset="0%"  stop-color="#6cf09a" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#6cf09a" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#6cf09a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="botGlow" cx="10%" cy="100%" r="55%">
      <stop offset="0%"  stop-color="#6cf09a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6cf09a" stop-opacity="0"/>
    </radialGradient>

    <filter id="cursorGlow" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base + atmosphere -->
  <rect width="1584" height="396" fill="#0e0e10"/>
  <rect width="1584" height="396" fill="url(#topGlow)"/>
  <rect width="1584" height="396" fill="url(#botGlow)"/>

  <!-- wordmark, biased upper-right so a profile photo overlapping bottom-left doesn't collide -->
  <g transform="translate(580 0)">
    <text class="serif" x="0" y="190" font-size="148" fill="#f3eee5"
          dominant-baseline="alphabetic">Bip<tspan font-style="italic" fill="#d8d2c5">Bop</tspan> Labs<tspan fill="#6cf09a" filter="url(#cursorGlow)">_</tspan></text>

    <!-- thin separator -->
    <line x1="2" y1="232" x2="86" y2="232" stroke="#6cf09a" stroke-width="1.2"/>

    <!-- tagline -->
    <text class="serif" x="0" y="290" font-size="42" font-style="italic" fill="#d8d2c5"
          dominant-baseline="alphabetic">thoughtful software for real people,</text>
    <text class="serif" x="0" y="338" font-size="42" font-style="italic" fill="#d8d2c5"
          dominant-baseline="alphabetic">with people we genuinely like.</text>
  </g>
</svg>
