<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 140" role="img" aria-label="BipBop Labs">
  <title>BipBop Labs</title>
  <defs>
    <symbol id="bb-mark" viewBox="0 0 64 64" overflow="visible">
      <text x="32" y="44" text-anchor="middle"
            font-family="'Instrument Serif', 'Times New Roman', serif"
            font-size="44" fill="currentColor"
        >B<tspan font-style="italic" fill="var(--signal, #6cf09a)">b</tspan><tspan fill="var(--signal, #6cf09a)">_</tspan></text>
    </symbol>
    <symbol id="bb-wordmark" viewBox="0 0 640 140" overflow="visible">
      <text x="20" y="98"
            font-family="'Instrument Serif', 'Times New Roman', serif"
            font-size="108" fill="currentColor"
        >Bip<tspan font-style="italic" fill="var(--signal, #6cf09a)">Bop</tspan> Labs<tspan fill="var(--signal, #6cf09a)">_</tspan></text>
    </symbol>
  </defs>
  <use href="#bb-mark" x="10" y="20" width="120" height="120"/>
  <line x1="150" y1="30" x2="150" y2="110" stroke="currentColor" stroke-opacity="0.2" stroke-width="1"/>
  <use href="#bb-wordmark" x="170" y="0" width="640" height="140"/>
</svg>
