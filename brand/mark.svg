<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="BipBop Labs">
  <title>BipBop Labs</title>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
      .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; }
    ]]></style>

    <radialGradient id="topGlow" cx="78%" cy="14%" r="62%">
      <stop offset="0%"  stop-color="#6cf09a" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#6cf09a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6cf09a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="botGlow" cx="14%" cy="98%" r="55%">
      <stop offset="0%"  stop-color="#6cf09a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6cf09a" stop-opacity="0"/>
    </radialGradient>

    <filter id="cursorGlow" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect width="320" height="320" rx="40"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="320" height="320" fill="#0e0e10"/>
    <rect width="320" height="320" fill="url(#topGlow)"/>
    <rect width="320" height="320" fill="url(#botGlow)"/>

    <text class="serif" x="160" y="200" text-anchor="middle" font-size="140" fill="#f3eee5"
          dominant-baseline="alphabetic">B<tspan font-style="italic" fill="#d8d2c5">b</tspan><tspan fill="#6cf09a" filter="url(#cursorGlow)">_</tspan></text>
  </g>

  <rect x="0.5" y="0.5" width="319" height="319" rx="39.5" fill="none" stroke="#2a2a30" stroke-width="1"/>
</svg>
