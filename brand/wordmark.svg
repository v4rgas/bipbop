<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="BipBop Labs">
  <title>BipBop Labs</title>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
      .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; }
    ]]></style>

    <radialGradient id="bg" cx="80%" cy="0%" r="90%">
      <stop offset="0%"  stop-color="#6cf09a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6cf09a" stop-opacity="0"/>
    </radialGradient>

    <filter id="cursorGlow" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="#0e0e10"/>
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <text class="serif" x="600" y="210" text-anchor="middle" font-size="170" fill="#f3eee5"
        dominant-baseline="alphabetic">Bip<tspan font-style="italic" fill="#d8d2c5">Bop</tspan> Labs<tspan fill="#6cf09a" filter="url(#cursorGlow)">_</tspan></text>
</svg>
